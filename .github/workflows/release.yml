name: Build Release Bundle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout theme repo
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

      - name: Clone upstream Codex
        shell: pwsh
        run: |
          git clone https://github.com/openai/codex.git "$env:RUNNER_TEMP\codex-src"
          git -C "$env:RUNNER_TEMP\codex-src" checkout 1de0085418340b3e7f7136cfb5e56b4bebafc584

      - name: Build patched Codex release binary
        shell: pwsh
        run: |
          .\windows\build.ps1 -CodexSourcePath "$env:RUNNER_TEMP\codex-src" -BuildRoot "$env:RUNNER_TEMP\codex-build-themes" -Configuration Release

      - name: Package release zip
        shell: pwsh
        run: |
          .\windows\package-release.ps1 -BuiltCodexExePath "$env:RUNNER_TEMP\codex-build-themes\release\codex.exe" -Version "${{ github.ref_name }}"

      - name: Upload bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip

      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-chat-themes-windows-x64
          path: dist/*.zip
